name: Deploy Morgen Bot

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permette l'avvio manuale dalla scheda Actions

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit

      - name: Run pre-commit (Ruff & Mypy)
        run: pre-commit run --all-files

  deploy:
    runs-on: ubuntu-latest
    needs: lint-and-test
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Version Variable
        id: version
        # Extracts short sha and format version
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          VERSION="1.0.${{ github.run_number }}-${SHORT_SHA}"
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          echo "APP_VERSION=$VERSION" >> $GITHUB_OUTPUT
          
          # Docker requires lowercase repository names
          REPO_LOWERCASE=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "REPO_LOWERCASE=$REPO_LOWERCASE" >> $GITHUB_ENV

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ghcr.io/${{ env.REPO_LOWERCASE }}

      - name: Determine Docker Tags
        id: docker_tags
        run: |
          # Assegna sempre il tag con la versione (per i test sui branch)
          TAGS="ghcr.io/${{ env.REPO_LOWERCASE }}:${{ env.APP_VERSION }}"
          
          # Se il workflow gira su main, aggiunge anche il tag latest
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            TAGS="$TAGS,ghcr.io/${{ env.REPO_LOWERCASE }}:latest"
          fi
          
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.docker_tags.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
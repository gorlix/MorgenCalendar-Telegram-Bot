name: Deploy Morgen Bot

on:
  push:
    branches:
      - main

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black

      - name: Check Formatting with Black
        run: black --check .

      - name: Lint with Flake8
        run: flake8 . --max-line-length=120

  deploy:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set Version Variable
        id: version
        # Extracts short sha and format version
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          VERSION="1.0.${{ github.run_number }}-${SHORT_SHA}"
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          echo "APP_VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.0
        env:
          APP_VERSION: ${{ env.APP_VERSION }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: APP_VERSION
          # Assumes the repository is cloned at the path specified by the SERVER_APP_DIR secret
          script: |
            cd ${{ secrets.SERVER_APP_DIR }}
            
            # Create backups folder
            mkdir -p backups
            
            # Backup the database with timestamp
            if [ -f data/morgen_bot.db ]; then
              cp data/morgen_bot.db backups/db_backup_$(date +%F_%T).db
              echo "Database backed up successfully."
            else
              echo "No database found to backup."
            fi
            
            # Pull latest changes
            git pull origin main
            
            # Export Variables for docker-compose
            export APP_VERSION=$APP_VERSION
            
            # Rebuild and restart containers
            docker-compose down
            docker-compose up -d --build

      - name: Send Telegram Notification
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.ADMIN_TELEGRAM_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            🚀 New Bot Version Deployed Successfully!
            🏷 Version: ${{ env.APP_VERSION }}
            🔗 Commit: ${{ github.sha }}
